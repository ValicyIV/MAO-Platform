version: "3.9"

services:
  # ── Frontend ──────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000

  # ── Backend ───────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse:3001
      DATABASE_URL: postgresql+asyncpg://mao:mao@postgres:5432/mao
      REDIS_URL: redis://redis:6379/0
      KUZU_DB_PATH: /app/data/kuzu
      MEMORY_GRAPH_ENABLED: "true"
      CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - ./data/agent-memory:/app/data/memory   # hot cache + episode logs
      - ./data/kuzu:/app/data/kuzu             # Kuzu knowledge graph
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mao
      POSTGRES_USER: mao
      POSTGRES_PASSWORD: mao
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mao"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  # ── Langfuse (observability) ──────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://mao:mao@postgres:5432/mao
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: change-me-in-production-32chars-min
      SALT: change-me-in-production-also
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
